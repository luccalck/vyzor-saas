# Nome do Workflow para o ambiente de Staging/Desenvolvimento
name: Build and Deploy to Staging (dev)

on:
  push:
    branches:
      - develop # GATILHO: Roda na branch 'develop'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Este passo agora apenas instala as dependências para testes futuros, não para o pacote.
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      # CORREÇÃO: Fazemos o upload do diretório inteiro, não de um zip.
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app-dev
          path: |
            .
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy to Staging App Service
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app-dev
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A1464DAD2BB742309580D0C740582C1D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FAA1BA83E0944F828488953AE0E070F7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BD9B921A1A3A432F94C387342B9F67A7 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vyzor-backend-dev'
          # CORREÇÃO: Removemos a linha 'package'. A ação irá empacotar o diretório automaticamente.

