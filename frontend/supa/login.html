<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VYZOR</title>
    <!-- 1. Carrega o Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 2. Define a fonte Inter como padrão */
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Importa a fonte Inter */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        /* 3. Classe para esconder/mostrar as "páginas" */
        .view {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-12">

    <div class="w-full max-w-md">
        
        <!-- ============================================= -->
        <!-- VIEW DE LOGIN                                 -->
        <!-- ============================================= -->
        <div id="login-view" class="view bg-white p-8 rounded-xl shadow-lg">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Login VYZOR</h2>
            <form id="login-form">
                <!-- Mensagem de Erro -->
                <div id="login-error" class="hidden text-sm text-center text-red-600 bg-red-100 p-3 rounded-lg mb-4"></div>
                
                <div class="mb-4">
                    <label for="login-email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="login-email" value="adm@vyzor.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-6">
                    <label for="login-password" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" id="login-password" value="senha_admin_forte" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button id="login-button" type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-blue-700 transition duration-300 flex items-center justify-center">
                    <span id="login-button-text">Entrar</span>
                    <!-- Indicador de Loading -->
                    <svg id="login-loading" class="hidden animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
            <p class="text-sm text-center text-gray-600 mt-6">
                Não tem uma conta? 
                <a href="#" id="show-register-link" class="font-medium text-blue-600 hover:underline">Cadastre-se</a>
            </p>
        </div>

        <!-- ============================================= -->
        <!-- VIEW DE CADASTRO                              -->
        <!-- ============================================= -->
        <div id="register-view" class="view bg-white p-8 rounded-xl shadow-lg">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Criar Conta</h2>
            <form id="register-form">
                <!-- Mensagem de Erro/Sucesso -->
                <div id="register-message" class="hidden text-sm text-center p-3 rounded-lg mb-4"></div>

                <div class="mb-4">
                    <label for="register-name" class="block text-sm font-medium text-gray-700 mb-2">Nome Completo</label>
                    <input type="text" id="register-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-4">
                    <label for="register-email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="register-email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-6">
                    <label for="register-password" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" id="register-password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button id="register-button" type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-blue-700 transition duration-300 flex items-center justify-center">
                    <span id="register-button-text">Criar Conta</span>
                    <!-- Indicador de Loading -->
                    <svg id="register-loading" class="hidden animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>
            <p class="text-sm text-center text-gray-600 mt-6">
                Já tem uma conta? 
                <a href="#" id="show-login-link" class="font-medium text-blue-600 hover:underline">Faça login</a>
            </p>
        </div>

    </div>

    <!-- 4. Lógica JavaScript -->
    <script type="module">
        // =============================================
        // CONFIGURAÇÃO
        // =============================================
        
        const API_BASE_URL = 'http://localhost:8000'; 
        
        // Elementos da UI
        const views = document.querySelectorAll('.view');
        const loginView = document.getElementById('login-view');
        const registerView = document.getElementById('register-view');

        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        
        const loginError = document.getElementById('login-error');
        const registerMessage = document.getElementById('register-message');
        
        const loginButton = document.getElementById('login-button');
        const loginButtonText = document.getElementById('login-button-text');
        const loginLoading = document.getElementById('login-loading');

        const registerButton = document.getElementById('register-button');
        const registerButtonText = document.getElementById('register-button-text');
        const registerLoading = document.getElementById('register-loading');

        const showLoginLink = document.getElementById('show-login-link');
        const showRegisterLink = document.getElementById('show-register-link');

        // =============================================
        // FUNÇÕES AUXILIARES
        // =============================================

        /** Mostra uma "página" (view) e esconde as outras */
        function showView(viewId) {
            views.forEach(view => {
                view.style.display = 'none';
            });
            document.getElementById(viewId).style.display = 'block';
        }

        /** Controla o estado de loading de um botão */
        function setButtonLoading(button, textEl, loadingEl, isLoading) {
            if (isLoading) {
                button.disabled = true;
                textEl.classList.add('hidden');
                loadingEl.classList.remove('hidden');
            } else {
                button.disabled = false;
                textEl.classList.remove('hidden');
                loadingEl.classList.add('hidden');
            }
        }

        /** Mostra mensagem de erro no login */
        function showLoginError(message) {
            loginError.textContent = message;
            loginError.classList.remove('hidden');
        }

        /** Mostra mensagem no cadastro (sucesso ou erro) */
        function showRegisterMessage(message, isError = false) {
            registerMessage.textContent = message;
            if (isError) {
                registerMessage.classList.remove('bg-green-100', 'text-green-700');
                registerMessage.classList.add('bg-red-100', 'text-red-700');
            } else {
                registerMessage.classList.remove('bg-red-100', 'text-red-700');
                registerMessage.classList.add('bg-green-100', 'text-green-700');
            }
            registerMessage.classList.remove('hidden');
        }

        // =============================================
        // LÓGICA PRINCIPAL
        // =============================================

        /** Lógica de Login */
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            setButtonLoading(loginButton, loginButtonText, loginLoading, true);
            loginError.classList.add('hidden');

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData,
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Salva o token no localStorage para ser usado em outra página
                    localStorage.setItem('authToken', data.access_token);
                    
                    // CORREÇÃO AQUI
                    // Redireciona para a página principal (index.html)
                    window.location.href = './index.html';

                } else {
                    showLoginError('Email ou senha incorretos.');
                }
            } catch (error) {
                console.error('Erro de rede:', error);
                showLoginError('Não foi possível conectar ao servidor. Verifique o console e a URL da API.');
            } finally {
                setButtonLoading(loginButton, loginButtonText, loginLoading, false);
            }
        });

        /** Lógica de Cadastro */
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            setButtonLoading(registerButton, registerButtonText, registerLoading, true);
            registerMessage.classList.add('hidden');

            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            
            const userData = {
                nome_completo: name,
                email: email,
                password: password,
                perfil: 'usuario'
            };

            try {
                const response = await fetch(`${API_BASE_URL}/usuarios/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData),
                });

                const data = await response.json();

                if (response.ok) {
                    showRegisterMessage('Conta criada com sucesso! Redirecionando para login...', false);
                    setTimeout(() => {
                        registerForm.reset();
                        showView('login-view');
                    }, 2000);
                } else if (response.status === 401 || response.status === 403) {
                     showRegisterMessage('Erro: Apenas administradores podem cadastrar novos usuários. Use os dados do seed_dev.py para testar o login.', true);
                } else if (response.status === 409) {
                     showRegisterMessage('Erro: Este email já está cadastrado.', true);
                } else {
                    showRegisterMessage(data.detail || 'Ocorreu um erro ao cadastrar.', true);
                }
            } catch (error) {
                console.error('Erro de rede:', error);
                showRegisterMessage('Não foi possível conectar ao servidor.', true);
            } finally {
                setButtonLoading(registerButton, registerButtonText, registerLoading, false);
            }
        });


        /** Navegação entre telas */
        showRegisterLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginError.classList.add('hidden');
            showView('register-view');
        });

        showLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            registerMessage.classList.add('hidden');
            showView('login-view');
        });

        // =============================================
        // INICIALIZAÇÃO
        // =============================================
        // Limpa qualquer token antigo ao carregar esta página
        localStorage.removeItem('authToken');
        // Mostra a view de login ao carregar a página
        showView('login-view');
    </script>
</body>
</html>
